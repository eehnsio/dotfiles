# Catppuccin Macchiato palette for lsd

user: 91
group: 91
permission:
  read: "#a6da95"      # green
  write: "#ed8796"     # red
  exec: "#eed49f"      # yellow
  exec-sticky: "#eed49f"
  no-access: "#6e738d"  # overlay0
  octal: "#8aadf4"     # blue
  acl: "#b7bdf8"       # lavender
  context: "#b7bdf8"

date:
  hour-old: "#a6da95"  # green
  day-old: "#8aadf4"   # blue
  older: "#6e738d"     # overlay0

size:
  none: "#6e738d"      # overlay0
  small: "#a6da95"     # green
  medium: "#eed49f"    # yellow
  large: "#ed8796"     # red

inode:
  valid: "#b7bdf8"     # lavender
  invalid: "#6e738d"   # overlay0

links:
  valid: "#b7bdf8"     # lavender
  invalid: "#ed8796"   # red

tree-edge: "#6e738d"   # overlay0

git-status:
  default: "#6e738d"
  unmodified: "#6e738d"
  ignored: "#6e738d"
  new-in-index: "#a6da95"
